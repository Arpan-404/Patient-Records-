<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhysioCare Tracker</title>
    
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @page { size: A4; margin: 10mm; }
        @media print {
            body { 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
                background-color: white !important;
            }
            .print-break-inside-avoid {
                break-inside: avoid;
                page-break-inside: avoid;
            }
            /* Allows headers to repeat on every page */
            thead.print-table-header { display: table-header-group; }
            table { page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            
            .editable-cell:empty:before {
                content: none !important;
                display: none !important;
            }
        }
        
        .editable-cell {
            min-width: 30px;
            max-width: 100%;
            outline: none;
            word-break: break-word;
            white-space: pre-wrap;
            transition: background-color 0.2s;
        }
        .editable-cell:empty:before {
            content: attr(data-placeholder);
            color: #cbd5e1;
            pointer-events: none;
            display: block; 
        }
        .editable-cell:focus {
            background-color: rgba(239, 246, 255, 0.5); 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        // --- FIREBASE IMPORTS (For Text Data Only) ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithCustomToken, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- FIREBASE CONFIGURATION ---
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            firebaseConfig = {
              apiKey: "AIzaSyCPhZY9CrsXJHIr5nBPaGPNVHsc70yfVus",
              authDomain: "patient-records-arpan.firebaseapp.com",
              projectId: "patient-records-arpan",
              storageBucket: "patient-records-arpan.firebasestorage.app",
              messagingSenderId: "599041105903",
              appId: "1:599041105903:web:7f0c1c10f38f12cc2ee01a",
              measurementId: "G-ZEE89YP3F3"
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'github-physio-app';

        // --- Joint Data ---
        const JOINTS_DATA = {
          'Cervical': [ { name: 'Flexion', type: 'single', normal: '45°' }, { name: 'Extension', type: 'single', normal: '45°' }, { name: 'Lat. Flexion', type: 'bilateral', normal: '45°' }, { name: 'Rotation', type: 'bilateral', normal: '60°' } ],
          'Spine': [ { name: 'Flexion', type: 'single', normal: '80°' }, { name: 'Extension', type: 'single', normal: '25°' }, { name: 'Lat. Flexion', type: 'bilateral', normal: '35°' }, { name: 'Rotation', type: 'bilateral', normal: '45°' } ],
          'Shoulder': [ { name: 'Flexion', type: 'bilateral', normal: '180°' }, { name: 'Extension', type: 'bilateral', normal: '60°' }, { name: 'Abduction', type: 'bilateral', normal: '180°' }, { name: 'Adduction', type: 'bilateral', normal: '50°' }, { name: 'Int. Rotation', type: 'bilateral', normal: '70°' }, { name: 'Ext. Rotation', type: 'bilateral', normal: '90°' } ],
          'Elbow': [ { name: 'Flexion', type: 'bilateral', normal: '150°' }, { name: 'Extension', type: 'bilateral', normal: '0°' } ],
          'Forearm': [ { name: 'Pronation', type: 'bilateral', normal: '80°' }, { name: 'Supination', type: 'bilateral', normal: '80°' } ],
          'Wrist': [ { name: 'Flexion', type: 'bilateral', normal: '80°' }, { name: 'Extension', type: 'bilateral', normal: '70°' }, { name: 'Radial Dev.', type: 'bilateral', normal: '20°' }, { name: 'Ulnar Dev.', type: 'bilateral', normal: '30°' } ],
          'Hip': [ { name: 'Flexion', type: 'bilateral', normal: '120°' }, { name: 'Extension', type: 'bilateral', normal: '30°' }, { name: 'Abduction', type: 'bilateral', normal: '45°' }, { name: 'Adduction', type: 'bilateral', normal: '30°' }, { name: 'Int. Rotation', type: 'bilateral', normal: '45°' }, { name: 'Ext. Rotation', type: 'bilateral', normal: '45°' } ],
          'Knee': [ { name: 'Flexion', type: 'bilateral', normal: '135°' }, { name: 'Extension', type: 'bilateral', normal: '0°' } ],
          'Ankle': [ { name: 'Dorsiflexion', type: 'bilateral', normal: '20°' }, { name: 'Plantarflexion', type: 'bilateral', normal: '50°' }, { name: 'Inversion', type: 'bilateral', normal: '35°' }, { name: 'Eversion', type: 'bilateral', normal: '15°' } ]
        };

        // --- Custom Table Builder Component ---
        function CustomTableEditor({ table, updateTable, removeTable }) {
            const addRow = () => { updateTable({ ...table, rows: [...table.rows, Array(table.headers.length).fill('')] }); };
            const addCol = () => { updateTable({ ...table, headers: [...table.headers, 'New Col'], rows: table.rows.map(r => [...r, '']) }); };
            const removeRow = (idx) => { const newRows = [...table.rows]; newRows.splice(idx, 1); updateTable({ ...table, rows: newRows }); };
            const removeCol = (idx) => { updateTable({ ...table, headers: table.headers.filter((_, i) => i !== idx), rows: table.rows.map(r => r.filter((_, i) => i !== idx)) }); };
            const updateHeader = (idx, val) => { const newHeaders = [...table.headers]; newHeaders[idx] = val; updateTable({ ...table, headers: newHeaders }); };
            const updateCell = (rIdx, cIdx, val) => { const newRows = [...table.rows]; newRows[rIdx][cIdx] = val; updateTable({ ...table, rows: newRows }); };
            const updateTitle = (val) => { updateTable({ ...table, title: val }); };

            return (
                <div className="w-fit max-w-full bg-white border border-slate-200 rounded-lg shadow-sm overflow-x-auto print:overflow-visible print:border-none print:shadow-none print-break-inside-avoid">
                    <div className={`bg-slate-100 px-3 py-2 flex items-center justify-between border-b border-slate-200 print:bg-transparent print:px-0 ${table.title ? 'print:border-b print:border-[#1e40af]' : 'print:border-none print:p-0'}`}>
                        <div contentEditable suppressContentEditableWarning onBlur={(e) => updateTitle(e.currentTarget.textContent)} className={`font-bold text-sm text-blue-800 outline-none editable-cell w-auto print:text-[#1e40af] print:text-[18px] ${!table.title ? 'print:hidden' : ''}`} data-placeholder="Table Title (Optional)">{table.title}</div>
                        <div className="flex gap-2 print:hidden ml-4">
                            <button onClick={addCol} className="text-[10px] bg-white border border-slate-300 text-slate-600 px-2 py-1 rounded hover:bg-slate-50 whitespace-nowrap">+ Col</button>
                            <button onClick={addRow} className="text-[10px] bg-white border border-slate-300 text-slate-600 px-2 py-1 rounded hover:bg-slate-50 whitespace-nowrap">+ Row</button>
                            <button onClick={removeTable} className="text-[10px] bg-red-50 border border-red-200 text-red-600 px-2 py-1 rounded hover:bg-red-100"><i className="ph-bold ph-trash"></i></button>
                        </div>
                    </div>
                    <div className="p-2 print:p-0 print:mt-2">
                        <table className="w-auto min-w-[200px] text-left border-collapse table-auto print:border print:border-[#1e40af]">
                            <thead>
                                <tr>
                                    {table.headers.map((h, i) => (
                                        <th key={i} className="relative group border border-slate-200 p-0 bg-slate-50 print:border print:border-[#1e40af] print:bg-blue-50/30 print-break-inside-avoid">
                                            <div contentEditable suppressContentEditableWarning onBlur={(e) => updateHeader(i, e.currentTarget.textContent)} className="editable-cell font-semibold text-slate-700 text-[12px] p-2 print:text-[#1e40af] print:font-bold print:text-[16px]" data-placeholder="Header">{h}</div>
                                            {table.headers.length > 1 && ( <button onClick={() => removeCol(i)} className="absolute -top-2 -right-2 bg-red-100 text-red-600 rounded-full w-4 h-4 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity print:hidden text-[8px] border border-red-200 z-10"><i className="ph-bold ph-x"></i></button> )}
                                        </th>
                                    ))}
                                    <th className="w-8 border-none print:hidden"></th>
                                </tr>
                            </thead>
                            <tbody>
                                {table.rows.map((row, rIdx) => (
                                    <tr key={rIdx} className="group print-break-inside-avoid">
                                        {row.map((cell, cIdx) => (
                                            <td key={cIdx} className="border border-slate-200 p-0 align-top print:border print:border-[#1e40af]">
                                                <div contentEditable suppressContentEditableWarning onBlur={(e) => updateCell(rIdx, cIdx, e.currentTarget.textContent)} className="editable-cell text-slate-700 text-[12px] p-2 min-h-[32px] print:text-slate-900 print:min-h-0 print:py-1.5 print:px-2.5 print:text-[16px]">{cell}</div>
                                            </td>
                                        ))}
                                        <td className="w-8 text-center border-none p-0 align-middle print:hidden">
                                            {table.rows.length > 1 && ( <button onClick={() => removeRow(rIdx)} className="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1"><i className="ph-bold ph-trash text-xs"></i></button> )}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function App() {
          const [patients, setPatients] = useState([]);
          const [currentView, setCurrentView] = useState('home');
          const [activePatientId, setActivePatientId] = useState(null);
          const [searchQuery, setSearchQuery] = useState('');
          const [isSaving, setIsSaving] = useState(false);
          
          // Firebase Auth State
          const [user, setUser] = useState(null);
          const [isConnecting, setIsConnecting] = useState(true);
          const [loginError, setLoginError] = useState("");

          useEffect(() => {
            const initAuth = async () => {
              if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  try { await signInWithCustomToken(auth, __initial_auth_token); } catch(e) { console.error(e); }
              }
            };
            initAuth();

            const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
              setUser(currentUser);
              setIsConnecting(false);
            });
            return () => unsubscribe();
          }, []);

          // Fetch Patients from Firestore
          useEffect(() => {
            if (!user) return;
            const patientsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'patients');
            const unsubscribe = onSnapshot(patientsRef, (snapshot) => {
              const data = [];
              snapshot.forEach(doc => {
                  const p = doc.data();
                  if (p.customTables) {
                      p.customTables = p.customTables.map(t => {
                          let parsedRows = [['', '']];
                          try { parsedRows = typeof t.rows === 'string' ? JSON.parse(t.rows) : t.rows; } catch(e) {}
                          return { ...t, rows: parsedRows };
                      });
                  }
                  data.push(p);
              });
              setPatients(data);
            }, (error) => { console.error("Firestore error:", error); });
            return () => unsubscribe();
          }, [user]);

          const handleGoogleLogin = async () => {
              setLoginError("");
              try { await signInWithPopup(auth, googleProvider); } catch (error) { setLoginError("Failed to sign in. Ensure domain is authorized."); }
          };

          const handleLogout = async () => {
              try { await signOut(auth); setPatients([]); } catch (error) {}
          };

          // --- App Handlers ---
          const handleCreatePatient = () => {
            const nextNum = patients.length === 0 ? 1 : Math.max(...patients.map(p => parseInt(p.ipId, 10) || 0)) + 1;
            const newIpId = String(nextNum).padStart(4, '0');
            const newPatient = {
              id: crypto.randomUUID(), ipId: newIpId, 
              date: new Date().toISOString().split('T')[0], // Assigns today's date upon creation
              name: '', age: '', gender: '', contact: '',
              chiefComplaints: '', history: '', assessmentNote: '', diagnosis: '',
              treatmentNote: '', customTables: [], reassessmentTables: [] 
            };
            setPatients([...patients, newPatient]); setActivePatientId(newPatient.id); setCurrentView('patient');
          };

          const handleOpenPatient = (id) => { setActivePatientId(id); setCurrentView('patient'); };

          const handleSavePatient = async (updatedPatient) => {
            setIsSaving(true);
            setPatients(prev => {
                const exists = prev.find(p => p.id === updatedPatient.id);
                if (exists) return prev.map(p => p.id === updatedPatient.id ? updatedPatient : p);
                return [...prev, updatedPatient];
            });

            if (user) {
              try {
                const patientToSave = { ...updatedPatient };
                // Cleanup deprecated top-level metric arrays if they exist
                delete patientToSave.trackedMetrics;
                delete patientToSave.records;
                
                if (patientToSave.customTables) {
                    patientToSave.customTables = patientToSave.customTables.map(t => ({ ...t, rows: JSON.stringify(t.rows) }));
                }
                Object.keys(patientToSave).forEach(key => { if (patientToSave[key] === undefined) delete patientToSave[key]; });
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'patients', updatedPatient.id);
                await setDoc(docRef, patientToSave);
              } catch(e) { console.error("Failed to save patient to cloud: ", e); }
            }
            setIsSaving(false);
          };

          const filteredPatients = patients.filter(p => {
            const q = searchQuery.toLowerCase();
            return p.ipId.toLowerCase().includes(q) || p.name.toLowerCase().includes(q) || p.contact.includes(q) || (p.diagnosis && p.diagnosis.toLowerCase().includes(q));
          });

          if (isConnecting) return (
               <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center gap-4 text-blue-600">
                  <i className="ph-bold ph-spinner-gap text-4xl animate-spin"></i><p className="font-semibold tracking-wide">Loading PhysioCare...</p>
               </div>
          )

          if (!user) return (
              <div className="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4">
                  <div className="bg-white p-8 rounded-2xl shadow-lg max-w-sm w-full text-center space-y-6">
                      <div className="mx-auto bg-blue-100 text-blue-600 w-16 h-16 rounded-full flex items-center justify-center mb-4 shadow-inner"><i className="ph-fill ph-activity text-4xl"></i></div>
                      <div><h1 className="text-2xl font-bold text-slate-800">PhysioCare</h1><p className="text-sm text-slate-500 mt-1">Private Clinical Tracker</p></div>
                      {loginError && <div className="p-3 bg-red-50 text-red-600 text-sm rounded-lg border border-red-100">{loginError}</div>}
                      <button onClick={handleGoogleLogin} className="w-full flex items-center justify-center gap-3 bg-white border border-slate-300 text-slate-700 font-medium py-3 px-4 rounded-xl hover:bg-slate-50 shadow-sm">
                          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" /> Sign in with Google
                      </button>
                  </div>
              </div>
          )

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans print:bg-white print:m-0 print:p-0">
              <header className="bg-blue-600 text-white shadow-md sticky top-0 z-10 print:hidden">
                <div className="max-w-6xl mx-auto px-3 py-2.5 flex justify-between items-center">
                  <div className="flex items-center gap-2 cursor-pointer" onClick={() => setCurrentView('home')}>
                    <div className="bg-white text-blue-600 p-1.5 rounded-full flex items-center justify-center"><i className="ph-bold ph-activity text-lg"></i></div>
                    <h1 className="text-lg font-bold tracking-wide">PhysioCare</h1>
                  </div>
                  <div className="flex items-center gap-3">
                      {isSaving && <span className="text-xs font-medium text-blue-200 animate-pulse hidden sm:block">Syncing...</span>}
                      {currentView === 'home' && <button onClick={handleCreatePatient} className="flex items-center gap-1.5 bg-blue-500 text-white px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-blue-400 shadow-sm border border-blue-400"><i className="ph-bold ph-plus"></i> Patient</button>}
                      <button onClick={handleLogout} className="flex items-center justify-center w-8 h-8 rounded-full bg-blue-700 hover:bg-blue-800 text-white border border-blue-500"><i className="ph-bold ph-sign-out text-sm"></i></button>
                  </div>
                </div>
              </header>

              <main className="max-w-6xl mx-auto px-2 sm:px-4 py-4 print:p-0 print:m-0 print:max-w-none">
                {currentView === 'home' ? (
                  <HomeView patients={filteredPatients} searchQuery={searchQuery} setSearchQuery={setSearchQuery} onOpenPatient={handleOpenPatient} />
                ) : (
                  <PatientDetailView 
                      patient={patients.find(p => p.id === activePatientId)} 
                      onSave={handleSavePatient} 
                      onCancel={() => { setCurrentView('home'); setActivePatientId(null); }} 
                  />
                )}
              </main>
            </div>
          );
        }

        // --- HOME VIEW ---
        function HomeView({ patients, searchQuery, setSearchQuery, onOpenPatient }) {
          return (
            <div className="space-y-4 print:hidden">
              <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex items-center gap-2">
                <i className="ph-bold ph-magnifying-glass text-slate-400 text-lg"></i>
                <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Search by name, ID, or diagnosis..." className="w-full bg-transparent focus:outline-none text-sm text-slate-700" />
              </div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="overflow-x-auto">
                  <table className="w-full border-collapse">
                    <thead>
                      <tr className="bg-slate-50 border-b border-slate-200 text-left text-xs text-slate-600 uppercase tracking-wider">
                        <th className="py-3 px-4 font-medium w-16">IP ID</th>
                        <th className="py-3 px-4 font-medium w-48">Patient</th>
                        <th className="py-3 px-4 font-medium">Diagnosis</th>
                      </tr>
                    </thead>
                    <tbody>
                      {patients.length === 0 ? (
                        <tr><td colSpan="3" className="py-8 text-center text-sm text-slate-400">No patients saved yet.</td></tr>
                      ) : (
                        patients.map(p => (
                          <tr key={p.id} className="border-b border-slate-100 hover:bg-blue-50/50 cursor-pointer" onClick={() => onOpenPatient(p.id)}>
                            <td className="py-3 px-4 text-sm font-semibold text-blue-600 align-top">{p.ipId}</td>
                            <td className="py-3 px-4 align-top">
                              <div className="font-medium text-sm text-slate-800 leading-tight">{p.name || 'Unnamed'}</div>
                              <div className="text-xs text-slate-500 mt-0.5">{p.contact || 'No contact'}</div>
                            </td>
                            <td className="py-3 px-4 text-sm text-slate-700 align-top">{p.diagnosis || <span className="text-slate-400 italic">Not diagnosed</span>}</td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        }

        // --- PATIENT DETAIL VIEW ---
        function PatientDetailView({ patient, onSave, onCancel }) {
          // Initialize state, handling migration from single-reassessment to multi-reassessment automatically.
          const [formData, setFormData] = useState(() => {
              let rTables = patient.reassessmentTables || [];
              if (rTables.length === 0 && (patient.trackedMetrics?.length > 0 || patient.records?.length > 0)) {
                  rTables = [{ id: 'default-reassessment', title: 'Reassessment and progression tracking :-', trackedMetrics: patient.trackedMetrics || [], records: patient.records || [] }];
              } else if (rTables.length === 0) {
                  rTables = [{ id: crypto.randomUUID(), title: 'Reassessment and progression tracking :-', trackedMetrics: [], records: [] }];
              }
              return { ...patient, customTables: patient.customTables || [], reassessmentTables: rTables, treatmentNote: patient.treatmentNote || '' };
          });
          
          const [isMetricModalOpen, setIsMetricModalOpen] = useState(false);
          const [activeReassessmentTableId, setActiveReassessmentTableId] = useState(null);
          const [printDate, setPrintDate] = useState(new Date().toISOString().split('T')[0]);

          const handleInputChange = (e) => { const { name, value } = e; setFormData((prev) => ({ ...prev, [name]: value })); };

          // --- Sub-components (Tables & Modals) ---
          const handleAddCustomTable = (section) => {
              const newTable = { id: crypto.randomUUID(), section: section, title: '', headers: ['Column 1', 'Column 2'], rows: [['', ''], ['', '']] };
              setFormData(prev => ({ ...prev, customTables: [...prev.customTables, newTable] }));
          };
          const handleUpdateCustomTable = (updatedTable) => { setFormData(prev => ({ ...prev, customTables: prev.customTables.map(t => t.id === updatedTable.id ? updatedTable : t) })); };
          const handleRemoveCustomTable = (id) => { setFormData(prev => ({ ...prev, customTables: prev.customTables.filter(t => t.id !== id) })); };

          // Multi-table functions
          const addReassessmentTable = () => { setFormData(prev => ({ ...prev, reassessmentTables: [...prev.reassessmentTables, { id: crypto.randomUUID(), title: 'Reassessment and progression tracking :-', trackedMetrics: [], records: [] }] })); };
          const removeReassessmentTable = (id) => { setFormData(prev => ({ ...prev, reassessmentTables: prev.reassessmentTables.filter(t => t.id !== id) })); };
          const updateReassessmentTableTitle = (tableId, newTitle) => { setFormData(prev => ({ ...prev, reassessmentTables: prev.reassessmentTables.map(t => t.id === tableId ? { ...t, title: newTitle } : t) })); };

          const addMetricColumn = (tableId, metricObj) => { 
              setFormData(prev => ({ ...prev, reassessmentTables: prev.reassessmentTables.map(t => t.id === tableId ? { ...t, trackedMetrics: [...t.trackedMetrics, metricObj] } : t) })); 
              setIsMetricModalOpen(false); 
              setActiveReassessmentTableId(null);
          };
          
          const removeMetricColumn = (tableId, metricId) => { 
              setFormData(prev => ({ ...prev, reassessmentTables: prev.reassessmentTables.map(t => { if (t.id !== tableId) return t; return { ...t, trackedMetrics: t.trackedMetrics.filter(m => m.id !== metricId), records: t.records.map(rec => { const newValues = { ...rec.values }; delete newValues[metricId]; return { ...rec, values: newValues }; }) }; }) })); 
          };
          
          const addDateRow = (tableId) => { setFormData(prev => ({ ...prev, reassessmentTables: prev.reassessmentTables.map(t => t.id === tableId ? { ...t, records: [...t.records, { id: crypto.randomUUID(), date: new Date().toISOString().split('T')[0], values: {} }] } : t) })); };
          const removeDateRow = (tableId, recordId) => { setFormData(prev => ({ ...prev, reassessmentTables: prev.reassessmentTables.map(t => t.id === tableId ? { ...t, records: t.records.filter(r => r.id !== recordId) } : t) })); };
          const updateRecordDate = (tableId, recordId, newDate) => { setFormData(prev => ({ ...prev, reassessmentTables: prev.reassessmentTables.map(t => { if (t.id !== tableId) return t; return { ...t, records: t.records.map(r => r.id === recordId ? { ...r, date: newDate } : r) }; }) })); };
          const updateSimpleCellValue = (tableId, recordId, metricId, value) => { setFormData(prev => ({ ...prev, reassessmentTables: prev.reassessmentTables.map(t => { if (t.id !== tableId) return t; return { ...t, records: t.records.map(rec => { if (rec.id !== recordId) return rec; return { ...rec, values: { ...rec.values, [metricId]: value } }; })}; }) })); };

                                                                        <span className="leading-tight px-1 mb-1.5 pt-1">{metric.title}</span>
                                                                        {metric.isBilateral && (metric.type === 'ROM' || metric.type === 'MMT') && ( <div className="flex w-full border-t border-[#1e40af] text-[14px] text-[#1e40af] mt-auto"><div className="flex-1 py-1 border-r border-[#1e40af] font-bold">R</div><div className="flex-1 py-1 font-bold">L</div></div> )}
                                                                        {metric.type === 'ROM with VAS' && ( <div className="flex w-full border-t border-[#1e40af] text-[14px] text-[#1e40af] mt-auto"><div className="flex-1 py-1 border-r border-[#1e40af] font-bold">VAS</div><div className="flex-1 py-1 font-bold">Treatment</div></div> )}
                                                                    </div>
                                                                </th>
                                                            ))}
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {rtable.records.map(record => (
                                                            <tr key={record.id} className="print-break-inside-avoid">
                                                                <td className="p-2 border border-[#1e40af] whitespace-nowrap align-top font-medium">{record.date ? new Date(record.date).toLocaleDateString('en-GB') : ''}</td>
                                                                {rtable.trackedMetrics.map(metric => {
                                                                    const cellValue = record.values[metric.id];
                                                                    if (metric.isBilateral && (metric.type === 'ROM' || metric.type === 'MMT')) {
                                                                        return ( <td key={metric.id} className="p-0 border border-[#1e40af] align-top"><div className="flex h-full min-h-[32px]"><div className="flex-1 border-r border-[#1e40af] flex items-center justify-center p-1.5">{cellValue?.r || '-'}</div><div className="flex-1 flex items-center justify-center p-1.5">{cellValue?.l || '-'}</div></div></td> );
                                                                    }
                                                                    if (metric.type === 'ROM with VAS') {
                                                                        let entries = Array.isArray(cellValue) ? cellValue : [];
                                                                        if (entries.length === 0) return <td key={metric.id} className="border border-[#1e40af] text-center">-</td>;
                                                                        return (
                                                                            <td key={metric.id} className="p-0 border border-[#1e40af] align-top">
                                                                                <div className="flex flex-col h-full min-h-[32px]">{entries.map((entry, idx) => ( <div key={idx} className="flex border-b border-[#1e40af]/40 last:border-b-0"><div className="flex-1 border-r border-[#1e40af]/40 flex items-center justify-center p-1.5">{entry.vas || '-'}</div><div className="flex-1 flex items-center justify-center p-1.5">{entry.rom ? `${entry.rom}` : '-'}</div></div> ))}</div>
                                                                            </td>
                                                                        );
                                                                    }
                                                                    return ( <td key={metric.id} className="p-2 border border-[#1e40af] text-center align-middle">{cellValue || '-'}</td> );
                                                                })}
                                                            </tr>
                                                        ))}
                                                        {rtable.records.length === 0 && ( <tr className="print-break-inside-avoid"><td colSpan={rtable.trackedMetrics.length + 1} className="p-3 border border-[#1e40af] text-center italic text-slate-500">No records added.</td></tr> )}
                                                    </tbody>
                                                </table>
                                              ) : ( <p className="text-slate-500 italic ml-2 mt-2 hidden print:block text-[14px]">No core metrics tracked.</p> )}
                                          </div>
                                      ))}

                                  </div>
                              </td>
                          </tr>
                      </tbody>
                  </table>
              </div>
              {isMetricModalOpen && <AddMetricModal onClose={() => { setIsMetricModalOpen(false); setActiveReassessmentTableId(null); }} onAdd={(metricObj) => addMetricColumn(activeReassessmentTableId, metricObj)} />}
            </div>
          );
        }

        // --- COLUMN BUILDER MODAL ---
        function AddMetricModal({ onClose, onAdd }) {
          const [type, setType] = useState('ROM'); const [romMode, setRomMode] = useState('Active');
          const jointsList = Object.keys(JOINTS_DATA); const [selectedJointGroup, setSelectedJointGroup] = useState(jointsList[2]); 
          const [selectedMovementIdx, setSelectedMovementIdx] = useState(0); const [side, setSide] = useState('R'); const [customName, setCustomName] = useState('');
          useEffect(() => { setSelectedMovementIdx(0); }, [selectedJointGroup]);

          const handleAdd = () => {
            let title = ''; const movement = JOINTS_DATA[selectedJointGroup][selectedMovementIdx];
            let isBilateral = false; let normalVal = '';

            if (type === 'ROM' || type === 'ROM with VAS') {
              title += `${romMode} ${selectedJointGroup} ${movement.name}`; normalVal = movement.normal;
              if (type === 'ROM with VAS' && movement.type === 'bilateral') title += ` (${side})`;
              else if (type === 'ROM') isBilateral = movement.type === 'bilateral';
            } 
            else if (type === 'MMT') { 
              title += `${selectedJointGroup} ${movement.name}`; isBilateral = movement.type === 'bilateral'; normalVal = '5/5'; 
            } 
            else if (type === 'VAS') {
              title = customName || 'VAS'; isBilateral = false; normalVal = '0-10';
            }
            else { 
              title = customName || 'Custom Column'; isBilateral = false; normalVal = ''; 
            }

            onAdd({ id: crypto.randomUUID(), type, title, isBilateral, normal: normalVal });
          };
          const currentMovements = JOINTS_DATA[selectedJointGroup]; const selectedMovement = currentMovements[selectedMovementIdx];

          return (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-3 print:hidden">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden animate-in zoom-in-95 duration-200">
                <div className="flex justify-between items-center p-3 border-b border-slate-100 bg-slate-50"><h3 className="font-bold text-sm text-slate-800">New Tracker Column</h3><button onClick={onClose} className="p-1 text-slate-400 hover:bg-slate-200 rounded-full"><i className="ph-bold ph-x text-lg"></i></button></div>
                <div className="p-4 space-y-4">
                  <div className="space-y-1">
                    <label className="text-[11px] font-semibold text-slate-500 uppercase tracking-wider">Metric Type</label>
                    <select value={type} onChange={(e) => setType(e.target.value)} className="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-1 focus:ring-blue-500">
                        <option value="ROM">Range of Motion (ROM)</option>
                        <option value="MMT">Manual Muscle Test (MMT)</option>
                        <option value="ROM with VAS">ROM + VAS (Single Side)</option>
                        <option value="VAS">VAS (Pain Scale)</option>
                        <option value="Other">Other / Treatment</option>
                    </select>
                  </div>
                  {(type === 'ROM' || type === 'ROM with VAS' || type === 'MMT') && (
                    <>
                      {(type === 'ROM' || type === 'ROM with VAS') && (
                        <div className="flex gap-4"><label className="flex items-center gap-1.5 text-sm"><input type="radio" checked={romMode === 'Active'} onChange={() => setRomMode('Active')} className="accent-blue-600" /> Active</label><label className="flex items-center gap-1.5 text-sm"><input type="radio" checked={romMode === 'Passive'} onChange={() => setRomMode('Passive')} className="accent-blue-600" /> Passive</label></div>
                      )}
                      <div className="grid grid-cols-2 gap-3">
                        <div className="space-y-1"><label className="text-[11px] font-semibold text-slate-500 uppercase tracking-wider">Joint</label><select value={selectedJointGroup} onChange={(e) => setSelectedJointGroup(e.target.value)} className="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-1 focus:ring-blue-500">{Object.keys(JOINTS_DATA).map(j => <option key={j} value={j}>{j}</option>)}</select></div>
                        <div className="space-y-1"><label className="text-[11px] font-semibold text-slate-500 uppercase tracking-wider">Movement</label><select value={selectedMovementIdx} onChange={(e) => setSelectedMovementIdx(Number(e.target.value))} className="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-1 focus:ring-blue-500">{currentMovements.map((m, i) => <option key={i} value={i}>{m.name}</option>)}</select></div>
                      </div>
                      {type === 'ROM with VAS' && selectedMovement.type === 'bilateral' && (
                        <div className="flex gap-4 pt-1"><label className="flex items-center gap-1.5 text-sm"><input type="radio" checked={side === 'R'} onChange={() => setSide('R')} className="accent-blue-600" /> Right Side</label><label className="flex items-center gap-1.5 text-sm"><input type="radio" checked={side === 'L'} onChange={() => setSide('L')} className="accent-blue-600" /> Left Side</label></div>
                      )}
                    </>
                  )}
                  {(type === 'Other' || type === 'VAS') && ( 
                      <div className="space-y-1">
                          <label className="text-[11px] font-semibold text-slate-500 uppercase tracking-wider">Name</label>
                          <input type="text" value={customName} onChange={(e) => setCustomName(e.target.value)} placeholder={type === 'VAS' ? "e.g. Resting VAS (Leave blank for default)" : "e.g. Current Treatment"} className="w-full p-2 text-sm bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-1 focus:ring-blue-500" />
                      </div> 
                  )}
                </div>
                <div className="p-3 border-t border-slate-100 bg-slate-50"><button onClick={handleAdd} className="w-full py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 shadow-sm transition-colors">Add Column</button></div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

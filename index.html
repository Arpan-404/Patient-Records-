<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhysioCare Tracker</title>
    
    <!-- React & Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @page { size: A4; margin: 10mm; }
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; }
            header, .no-print { display: none !important; }
            .print-break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
            .editable-cell:empty:before { content: none !important; }
        }
        .editable-cell { min-width: 30px; outline: none; transition: background-color 0.2s; }
        .editable-cell:empty:before { content: attr(data-placeholder); color: #cbd5e1; pointer-events: none; }
        .editable-cell:focus { background-color: rgba(239, 246, 255, 0.8); }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;

        // --- CLOUDINARY CONFIG (Updated with your details) ---
        const CLOUDINARY_CLOUD_NAME = "dyunl0dx5"; 
        const CLOUDINARY_UPLOAD_PRESET = "physio_preset";

        // --- FIREBASE IMPORTS ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCPhZY9CrsXJHIr5nBPaGPNVHsc70yfVus",
            authDomain: "patient-records-arpan.firebaseapp.com",
            projectId: "patient-records-arpan",
            storageBucket: "patient-records-arpan.firebasestorage.app",
            appId: "1:599041105903:web:7f0c1c10f38f12cc2ee01a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = 'github-physio-app';

        function App() {
            const [user, setUser] = useState(null);
            const [patients, setPatients] = useState([]);
            const [view, setView] = useState('home'); // 'home' or 'details'
            const [activePatient, setActivePatient] = useState(null);
            const [loading, setLoading] = useState(true);
            const [uploading, setUploading] = useState(false);
            const [search, setSearch] = useState("");

            useEffect(() => {
                const unsubAuth = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const pRef = collection(db, 'artifacts', appId, 'users', user.uid, 'patients');
                const unsubSnap = onSnapshot(pRef, (snap) => {
                    setPatients(snap.docs.map(d => ({ ...d.data(), id: d.id })));
                });
                return () => unsubSnap();
            }, [user]);

            const login = () => signInWithPopup(auth, provider);
            const logout = () => { signOut(auth); setView('home'); };

            const createPatient = () => {
                const newId = crypto.randomUUID();
                const ip = String(patients.length + 1).padStart(4, '0');
                const newP = { 
                    id: newId, ipId: ip, name: '', age: '', gender: '', contact: '',
                    chiefComplaints: '', assessment: '', diagnosis: '', treatment: '',
                    attachments: [] 
                };
                setActivePatient(newP);
                setView('details');
            };

            const savePatient = async (p) => {
                if (!user) return;
                await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'patients', p.id), p);
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file || !activePatient) return;
                
                setUploading(true);
                const fd = new FormData();
                fd.append('file', file);
                fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

                try {
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
                        method: 'POST',
                        body: fd
                    });
                    const data = await res.json();
                    
                    const updated = {
                        ...activePatient,
                        attachments: [...(activePatient.attachments || []), {
                            id: data.public_id,
                            url: data.secure_url,
                            name: file.name,
                            date: new Date().toLocaleDateString('en-GB')
                        }]
                    };
                    setActivePatient(updated);
                    await savePatient(updated);
                } catch (err) {
                    alert("Upload failed. Verify Cloudinary preset is 'Unsigned'.");
                } finally {
                    setUploading(false);
                }
            };

            const deletePatient = async (id) => {
                if(confirm("Delete this patient record?")) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'patients', id));
                    setView('home');
                }
            };

            if (loading) return <div className="h-screen flex items-center justify-center"><div className="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div></div>;

            if (!user) return (
                <div className="h-screen flex flex-col items-center justify-center p-6 text-center">
                    <div className="bg-blue-600 text-white p-4 rounded-full mb-4 shadow-lg"><i className="ph-fill ph-activity text-5xl"></i></div>
                    <h1 className="text-3xl font-bold text-slate-800 mb-2">PhysioCare</h1>
                    <p className="text-slate-500 mb-8">Manage patient records & X-rays securely.</p>
                    <button onClick={login} className="flex items-center gap-3 bg-white border border-slate-300 px-8 py-3 rounded-2xl shadow-md font-bold text-slate-700 hover:bg-slate-50 transition-all">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-6" /> Sign in with Google
                    </button>
                </div>
            );

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-md no-print flex justify-between items-center">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                            <i className="ph-bold ph-activity text-2xl"></i>
                            <span className="font-bold text-lg tracking-tight">PhysioCare</span>
                        </div>
                        <div className="flex gap-2">
                            {view === 'home' && <button onClick={createPatient} className="bg-white/20 px-3 py-1.5 rounded-lg text-sm font-bold border border-white/30 hover:bg-white/30">+ Patient</button>}
                            <button onClick={logout} className="p-2 hover:bg-blue-700 rounded-lg"><i className="ph-bold ph-sign-out"></i></button>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 sm:p-6">
                        {view === 'home' ? (
                            <div className="space-y-4 no-print">
                                <div className="bg-white p-3 rounded-2xl shadow-sm border flex items-center gap-3">
                                    <i className="ph ph-magnifying-glass text-slate-400"></i>
                                    <input type="text" placeholder="Search by name or ID..." value={search} onChange={(e) => setSearch(e.target.value)} className="w-full outline-none text-sm" />
                                </div>
                                <div className="grid gap-3">
                                    {patients.filter(p => p.name.toLowerCase().includes(search.toLowerCase()) || p.ipId.includes(search)).map(p => (
                                        <div key={p.id} onClick={() => { setActivePatient(p); setView('details'); }} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm hover:border-blue-300 transition-colors cursor-pointer group">
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <span className="text-[10px] font-bold text-blue-500 uppercase tracking-widest">ID: {p.ipId}</span>
                                                    <h3 className="font-bold text-slate-800 text-lg">{p.name || "Unnamed"}</h3>
                                                    <p className="text-xs text-slate-500">{p.diagnosis || "No diagnosis yet"}</p>
                                                </div>
                                                <i className="ph ph-caret-right text-slate-300 group-hover:text-blue-500 transition-colors"></i>
                                            </div>
                                        </div>
                                    ))}
                                    {patients.length === 0 && <div className="text-center py-20 text-slate-400 italic">No patients found. Create one to start.</div>}
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div className="flex justify-between no-print">
                                    <button onClick={() => setView('home')} className="text-slate-500 font-bold flex items-center gap-1"><i className="ph ph-arrow-left"></i> Back</button>
                                    <button onClick={() => deletePatient(activePatient.id)} className="text-red-400 text-sm hover:text-red-600">Delete Record</button>
                                </div>

                                {/* Patient Details Section */}
                                <section className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 print:shadow-none print:border-none">
                                    <div className="flex justify-between items-center mb-6 no-print">
                                        <h2 className="text-blue-800 font-black text-xl uppercase tracking-tighter">Clinical Intake</h2>
                                        <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-black">UPID: {activePatient.ipId}</span>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 no-print">
                                        <div className="col-span-2"><label className="text-[10px] font-bold text-slate-400 uppercase">Patient Name</label><input type="text" value={activePatient.name} onChange={(e) => setActivePatient({...activePatient, name: e.target.value})} className="w-full border-b py-1 outline-none font-bold text-slate-800" placeholder="Full Name" /></div>
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase">Age</label><input type="text" value={activePatient.age} onChange={(e) => setActivePatient({...activePatient, age: e.target.value})} className="w-full border-b py-1 outline-none" /></div>
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase">Gender</label><select value={activePatient.gender} onChange={(e) => setActivePatient({...activePatient, gender: e.target.value})} className="w-full border-b py-1 outline-none bg-transparent"><option value="">-</option><option value="M">Male</option><option value="F">Female</option></select></div>
                                    </div>

                                    <div className="mt-6 space-y-4">
                                        <div className="no-print">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase">Chief Complaints</label>
                                            <textarea rows="2" value={activePatient.chiefComplaints} onChange={(e) => setActivePatient({...activePatient, chiefComplaints: e.target.value})} className="w-full border rounded-xl p-3 mt-1 text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-blue-100" placeholder="e.g. Knee pain since 2 months..."></textarea>
                                        </div>
                                        <div className="no-print">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase">Assessment / Diagnosis</label>
                                            <textarea rows="3" value={activePatient.assessment} onChange={(e) => setActivePatient({...activePatient, assessment: e.target.value})} className="w-full border rounded-xl p-3 mt-1 text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-blue-100" placeholder="Clinical findings..."></textarea>
                                        </div>
                                    </div>
                                </section>

                                {/* Attachments Section */}
                                <section className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 no-print">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-purple-800 font-bold flex items-center gap-2"><i className="ph-fill ph-images"></i> X-Rays & Files</h2>
                                        <label className="bg-purple-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md cursor-pointer hover:bg-purple-700 transition-all">
                                            {uploading ? <i className="ph ph-spinner-gap animate-spin"></i> : <i className="ph ph-upload-simple mr-2"></i>}
                                            {uploading ? "Uploading..." : "Upload New"}
                                            <input type="file" className="hidden" onChange={handleFileUpload} accept="image/*,.pdf" />
                                        </label>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        {(activePatient.attachments || []).map(att => (
                                            <div key={att.id} className="flex items-center justify-between p-3 bg-slate-50 border rounded-2xl group">
                                                <div className="truncate pr-4">
                                                    <p className="font-bold text-xs truncate text-slate-700">{att.name}</p>
                                                    <p className="text-[9px] text-slate-400">{att.date}</p>
                                                </div>
                                                <div className="flex gap-2">
                                                    <a href={att.url} target="_blank" className="bg-white p-2 border rounded-lg text-blue-600 hover:shadow-sm"><i className="ph ph-eye"></i></a>
                                                    <button onClick={async () => {
                                                        const updated = {...activePatient, attachments: activePatient.attachments.filter(a => a.id !== att.id)};
                                                        setActivePatient(updated);
                                                        await savePatient(updated);
                                                    }} className="bg-white p-2 border rounded-lg text-red-400 hover:text-red-600"><i className="ph ph-trash"></i></button>
                                                </div>
                                            </div>
                                        ))}
                                        {(!activePatient.attachments || activePatient.attachments.length === 0) && <p className="text-xs text-slate-400 italic">No files attached yet.</p>}
                                    </div>
                                </section>

                                {/* Action Buttons */}
                                <div className="flex gap-3 justify-end no-print pt-4 pb-20">
                                    <button onClick={() => window.print()} className="bg-slate-200 text-slate-700 px-6 py-3 rounded-2xl font-bold flex items-center gap-2"><i className="ph ph-printer"></i> Print Rx</button>
                                    <button onClick={async () => { await savePatient(activePatient); setView('home'); }} className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-blue-200">Save Record</button>
                                </div>

                                {/* Print Template (Hidden on Screen) */}
                                <div className="hidden print:block bg-white text-blue-900 font-serif">
                                    <div className="border-b-4 border-blue-900 pb-4 mb-8 flex justify-between items-end">
                                        <div>
                                            <h1 className="text-4xl font-black italic tracking-tighter">Dr. Arpan Das (PT)</h1>
                                            <p className="text-sm">BPT (KPC Medical College and Hospital) | Physiotherapy Specialist</p>
                                        </div>
                                        <div className="text-right text-sm">
                                            <p className="font-bold"><i className="ph ph-phone"></i> +91 9641568109</p>
                                            <p>Date: {new Date().toLocaleDateString('en-GB')}</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-4 gap-4 mb-10 text-sm">
                                        <div className="col-span-2 border-b-2 border-slate-100">Patient: <span className="font-bold uppercase text-slate-800">{activePatient.name}</span></div>
                                        <div className="border-b-2 border-slate-100">Age/Sex: <span className="font-bold">{activePatient.age || '-'}/{activePatient.gender || '-'}</span></div>
                                        <div className="border-b-2 border-slate-100">UPID: <span className="font-bold">{activePatient.ipId}</span></div>
                                    </div>

                                    <div className="min-h-[600px] border-l-4 border-blue-50 pl-8 relative">
                                        <span className="absolute -left-3 top-0 text-5xl opacity-10 font-black italic">Rx</span>
                                        
                                        <div className="mb-8">
                                            <h3 className="font-bold text-lg mb-2 uppercase tracking-widest text-blue-800">Chief Complaints</h3>
                                            <p className="text-slate-800 whitespace-pre-wrap">{activePatient.chiefComplaints || 'N/A'}</p>
                                        </div>

                                        <div className="mb-8">
                                            <h3 className="font-bold text-lg mb-2 uppercase tracking-widest text-blue-800">Assessment & Diagnosis</h3>
                                            <p className="text-slate-800 whitespace-pre-wrap">{activePatient.assessment || 'N/A'}</p>
                                        </div>

                                        {activePatient.attachments && activePatient.attachments.length > 0 && (
                                            <div className="mt-20 pt-10 border-t border-slate-100">
                                                <p className="text-xs text-slate-400 italic">Digital records on file: {activePatient.attachments.map(a => a.name).join(', ')}</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
